<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pencil Controller</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            /* スワイプによるスクロールや戻る動作を無効化 */
            touch-action: none;
        }

        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="status">Connecting...</div>

    <script>
        // 自分のIPアドレスを書く
        const PC_IP_ADDRESS = "192.168.11.63";
        const ws = new WebSocket(`ws://${PC_IP_ADDRESS}:8080/pencil`);
        const statusDiv = document.getElementById("status");

        ws.onopen = () => {
            statusDiv.innerText = "Connected to Unity!";
            statusDiv.style.color = "#00ff00";
        };

        ws.onclose = () => {
            statusDiv.innerText = "Disconnected.";
            statusDiv.style.color = "#ff0000";
        };

        ws.onerror = (error) => {
            statusDiv.innerText = "Connection Error";
            statusDiv.style.color = "#ff0000";
        };

        // イベント送信用の関数
        function sendPointerData(e, isPressed) {
            if (ws.readyState !== WebSocket.OPEN) return;

            // HTMLの座標(左上原点)を、UnityのUV座標(左下原点)に合わせて変換 (0.0 ~ 1.0)
            const normalizedX = e.clientX / window.innerWidth;
            const normalizedY = 1.0 - (e.clientY / window.innerHeight);

            const data = {
                x: normalizedX,
                y: normalizedY,
                pressure: e.pressure, // 筆圧 (0.0 ~ 1.0)
                tiltX: e.tiltX,       // 傾きX (-90 ~ 90)
                tiltY: e.tiltY,       // 傾きY (-90 ~ 90)
                isPressed: isPressed  // 画面に触れているか
            };

            ws.send(JSON.stringify(data));
        }

        // Pointer Eventsの登録（マウス、タッチ、ペン全てを統合して扱えるAPI）
        window.addEventListener('pointermove', (e) => {
            // 画面に触れている(ボタンが押されている)時だけ送信
            if (e.buttons > 0) {
                sendPointerData(e, true);
            }
        });

        window.addEventListener('pointerdown', (e) => {
            sendPointerData(e, true);
        });

        window.addEventListener('pointerup', (e) => {
            sendPointerData(e, false);
        });
    </script>
</body>

</html>
